name = "receiptvault-backup"
main = "src/index.ts"
compatibility_date = "2026-06-04"

[vars]
FIREBASE_PROJECT_ID = "receiptvault-corsair"
REQUIRE_PLUS_CLAIM = "true"
GEMINI_MODEL = "gemini-2.5-flash-lite"
GOOGLE_PLAY_PACKAGE_NAME = "com.corsairlabs.receiptvault"

[triggers]
crons = ["*/30 * * * *"]

[[r2_buckets]]
binding = "RECEIPTS_BUCKET"
bucket_name = "receiptvault-receipts"
