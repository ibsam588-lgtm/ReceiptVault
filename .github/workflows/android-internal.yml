name: Android internal testing

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "gradle/**"
      - "gradle.properties"
      - "gradlew"
      - "gradlew.bat"
      - "settings.gradle.kts"
      - ".github/workflows/android-internal.yml"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SIGN_IN_WEB_CLIENT_ID: ${{ secrets.GOOGLE_SIGN_IN_WEB_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Prepare release version
        run: |
          echo "ANDROID_VERSION_CODE=$((1000 + GITHUB_RUN_NUMBER))" >> "$GITHUB_ENV"
          echo "ANDROID_VERSION_NAME=0.1.$GITHUB_RUN_NUMBER" >> "$GITHUB_ENV"

      - name: Decode upload keystore
        run: |
          echo "$ANDROID_UPLOAD_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"
        env:
          ANDROID_UPLOAD_KEYSTORE_BASE64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}

      - name: Build release bundle
        run: ./gradlew :app:bundleRelease
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload bundle artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: receiptvault-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 1

      - name: Upload to Google Play internal testing
        if: env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.corsairlabs.receiptvault
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed

      - name: Skip Google Play upload
        if: env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON == ''
        run: echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is not configured; release bundle was built but not uploaded."
