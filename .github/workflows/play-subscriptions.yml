name: Configure Play subscriptions

on:
  workflow_dispatch:

jobs:
  configure:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Configure subscription products
        if: env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != ''
        run: node scripts/configure_play_subscriptions.mjs

      - name: Missing Google Play service account
        if: env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON == ''
        run: |
          echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON is not configured."
          exit 1
