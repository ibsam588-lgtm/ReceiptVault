name: Extract Play App Signing SHA1

on:
  workflow_dispatch:

jobs:
  extract-sha1:
    runs-on: ubuntu-latest
    env:
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-api-python-client google-auth requests

      - name: Extract Play App Signing SHA1
        run: |
          python3 - << 'PYEOF'
          import json, os, tempfile, subprocess, zipfile
          import google.auth.transport.requests
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          import requests as req_lib

          sa_json = os.environ['GOOGLE_PLAY_SERVICE_ACCOUNT_JSON']
          creds = service_account.Credentials.from_service_account_info(
              json.loads(sa_json),
              scopes=['https://www.googleapis.com/auth/androidpublisher']
          )
          auth_req = google.auth.transport.requests.Request()
          creds.refresh(auth_req)

          service = build('androidpublisher', 'v3', credentials=creds)
          pkg = 'com.corsairlabs.receiptvault'

          # Create a temporary edit (needed for bundles.list)
          edit = service.edits().insert(packageName=pkg, body={}).execute()
          edit_id = edit['id']
          print(f"Edit ID: {edit_id}")

          try:
              bundles = service.edits().bundles().list(packageName=pkg, editId=edit_id).execute()
              bundles_list = bundles.get('bundles', [])
              print(f"Total bundles found: {len(bundles_list)}")

              if not bundles_list:
                  print("ERROR: No bundles found. Trying version code 1026 directly...")
                  latest_vc = 1026
              else:
                  latest_vc = max(b['versionCode'] for b in bundles_list)
              print(f"Using version code: {latest_vc}")

              try:
                  gen_apks = service.generatedapks().list(
                      packageName=pkg, versionCode=latest_vc
                  ).execute()
                  gen_list = gen_apks.get('generatedApks', [])
                  print(f"Generated APKs per signing key: {len(gen_list)}")

                  for idx, apk_per_key in enumerate(gen_list):
                      print(f"\n--- Signing key entry {idx} ---")
                      print(f"Keys present: {list(apk_per_key.keys())}")

                      # SHA-256 is available directly — Firebase accepts this
                      cert_sha256 = apk_per_key.get('certificateSha256Hash')
                      if cert_sha256:
                          print(f"\n=== PLAY APP SIGNING SHA-256 (add to Firebase) ===")
                          print(f"SHA-256: {cert_sha256}")
                          print("===================================================")

                      # Find a downloadId from any available APK type
                      dl_id = None
                      dl_source = None

                      universal = apk_per_key.get('generatedUniversalApk', {})
                      if isinstance(universal, dict) and 'downloadId' in universal:
                          dl_id = universal['downloadId']
                          dl_source = 'generatedUniversalApk'

                      if not dl_id:
                          for field in ('generatedSplitApks', 'unprotectedGeneratedSplitApks'):
                              splits = apk_per_key.get(field, [])
                              if splits and isinstance(splits[0], dict) and 'downloadId' in splits[0]:
                                  dl_id = splits[0]['downloadId']
                                  dl_source = field
                                  break

                      if not dl_id:
                          print("No downloadId found in this entry. Full structure (truncated):")
                          print(json.dumps(apk_per_key, indent=2)[:3000])
                          continue

                      print(f"Using downloadId from {dl_source}: {dl_id}")
                      url = (
                          f'https://androidpublisher.googleapis.com'
                          f'/androidpublisher/v3/applications/{pkg}'
                          f'/generatedApks/{latest_vc}/downloads/{dl_id}:download?alt=media'
                      )
                      print(f"Downloading APK...")
                      headers = {'Authorization': f'Bearer {creds.token}'}
                      resp = req_lib.get(url, headers=headers, stream=True, timeout=180, allow_redirects=True)
                      resp.raise_for_status()

                      with tempfile.NamedTemporaryFile(suffix='.apk', delete=False) as f:
                          for chunk in resp.iter_content(1024 * 1024):
                              f.write(chunk)
                          apk_path = f.name
                      print(f"Downloaded APK: {os.path.getsize(apk_path)} bytes")

                      # Use apksigner (handles V2/V3 APK signing schemes)
                      import glob as _glob
                      apksigner_paths = sorted(_glob.glob('/usr/local/lib/android/sdk/build-tools/*/apksigner'))
                      if not apksigner_paths:
                          apksigner_paths = sorted(_glob.glob('/opt/android-sdk/build-tools/*/apksigner'))
                      if not apksigner_paths:
                          # Try finding via which
                          r_which = subprocess.run(['which', 'apksigner'], capture_output=True, text=True)
                          if r_which.returncode == 0:
                              apksigner_paths = [r_which.stdout.strip()]

                      print(f"apksigner candidates: {apksigner_paths}")
                      if apksigner_paths:
                          apksigner = apksigner_paths[-1]  # latest version
                          r_sign = subprocess.run([apksigner, 'verify', '--print-certs', apk_path],
                                                  capture_output=True, text=True)
                          print("\n=== APKSIGNER CERT OUTPUT ===")
                          print(r_sign.stdout)
                          if r_sign.stderr:
                              print("stderr:", r_sign.stderr[:500])
                          # Extract SHA-1 from output
                          for line in r_sign.stdout.splitlines():
                              if 'SHA-1' in line or 'sha-1' in line.lower():
                                  print(f"\n=== PLAY APP SIGNING SHA-1 FINGERPRINT ===")
                                  print(line)
                                  # apksigner prints hex without colons; format with colons
                                  raw = line.split(':')[-1].strip()
                                  if len(raw) == 40:
                                      with_colons = ':'.join(raw[i:i+2].upper() for i in range(0, 40, 2))
                                      print(f"SHA-1 (for Firebase, with colons): {with_colons}")
                                      print(f"SHA-1 (no colons, lowercase): {raw.lower()}")
                                  print("==========================================")
                      else:
                          print("apksigner not found! Install Android SDK build-tools.")
                      break  # one signing key is enough

              except Exception as e:
                  import traceback
                  print(f"Error: {e}")
                  traceback.print_exc()
          finally:
              service.edits().delete(packageName=pkg, editId=edit_id).execute()
              print("Edit deleted.")
          PYEOF
